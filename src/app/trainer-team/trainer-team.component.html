<section class="trainer-team-box">
    <div class="panel-heading">
        <h2>{{ 'trainer.storage.team' | translate }}</h2>
        <span>{{ trainerTeam.length }}/6</span>
    </div>

    <div class="trainer-overview">
        <div class="trainer-sprite">
            @if (trainer.sprite) {
                <img [src]="trainer.sprite" alt="Trainer Sprite">
            }
        </div>
        <app-badges [trainerBadges]="trainerBadges"></app-badges>
    </div>

    <div class="team-grid">
        @for (slot of teamSlots; track slot) {
            <div class="pokemon-container" [class.is-empty]="!trainerTeam[slot]">
                @if (trainerTeam[slot]; as pokemon) {
                    <img
                        [src]="getSprite(pokemon)"
                        placement="bottom"
                        ngbTooltip="{{ pokemon.text | translate }}">

                    @if (getMegaStoneSprite(pokemon); as megaStoneSprite) {
                        <button
                            type="button"
                            class="mega-stone-overlay-button"
                            (click)="triggerMegaStoneInterrupt(pokemon)"
                            placement="bottom"
                            ngbTooltip="{{ getMegaStoneTextKey(pokemon) | translate }}"
                            [attr.aria-label]="getMegaStoneTextKey(pokemon) | translate">
                            <img
                                [src]="megaStoneSprite"
                                class="mega-stone-overlay"
                                [style.background]="getMegaStoneFillStyle(pokemon)"
                                alt="Mega Stone">
                        </button>
                    }
                }
            </div>
        }
    </div>

    <div class="trainer-actions">
        <app-storage-pc></app-storage-pc>
        <app-pokedex></app-pokedex>
    </div>
</section>
