<button type="button" class="btn"
  [ngClass]="(darkMode | async) ? 'btn-outline-light' : 'btn-outline-dark'"
  (click)="openPokedex()">
  <ng-icon name="bootstrapBook"></ng-icon>
  {{ 'pokedex.button' | translate }}
</button>

<ng-template #pokedexModal let-modal>
  <div class="modal-header pokedex-header">
    <div>
      <span class="pokedex-kicker">Pokemon Roulette</span>
      <h4 class="modal-title">{{ 'pokedex.title' | translate }}</h4>
    </div>
    <button type="button" class="btn-close" (click)="closeModal()" aria-label="Close"></button>
  </div>

  <div class="modal-body pokedex-body">
    <section class="pokedex-toolbar">
      <div class="pokedex-tabs" role="tablist" aria-label="Pokédex view">
        <button type="button"
                class="pokedex-tab"
                [class.active]="activeTab === 'local'"
                (click)="activeTab = 'local'">
          {{ 'pokedex.tab.local' | translate: { region: currentRegion } }}
        </button>
        <button type="button"
                class="pokedex-tab"
                [class.active]="activeTab === 'national'"
                (click)="activeTab = 'national'">
          {{ 'pokedex.tab.national' | translate }}
        </button>
      </div>

      <div class="pokedex-progress" style="--caught-progress: {{ caughtProgress }}%">
        <div class="pokedex-count">
          <span>{{ 'pokedex.caught' | translate }}</span>
          <strong>{{ caughtCount }} / {{ totalCount }}</strong>
        </div>
        <div class="progress-track" aria-hidden="true">
          <span></span>
        </div>
      </div>
    </section>

    <section class="pokedex-grid">
      @for (id of activeIds; track id) {
        <app-pokedex-entry
          [pokemonId]="id"
          [entry]="pokedexData?.caught?.[id.toString()]"
          (entryClicked)="onEntryClicked($event)">
        </app-pokedex-entry>
      }
    </section>
  </div>
</ng-template>
