<div class="badge-section">
    @for (slot of badgeSlots; track slot) {
        <div class="badge-container" [class.is-empty]="!trainerBadges[slot]">
            @if (trainerBadges[slot]; as badge) {
                <img
                    [src]="badge.sprite"
                    placement="bottom"
                    ngbTooltip="{{ badge.name | translate }}"
                    alt="">
            }
        </div>
    }
</div>
