<main class="settings-page">
    <aside class="settings-nav">
        <app-main-game-button></app-main-game-button>
    </aside>

    <section class="settings-panel">
        <header class="settings-header">
            <ng-icon name="bootstrapGear"></ng-icon>
            <h1>{{ 'settings.label' | translate }}</h1>
        </header>

        @if (settings$ | async; as settings) {
            <div class="settings-stack">
                <div class="settings-row">
                    <app-theme-selector></app-theme-selector>
                </div>

                <div class="settings-row settings-row--stacked">
                    <span class="setting-label">{{ 'settings.defaultGender.title' | translate }}</span>
                    <div class="option-grid">
                        <label class="option-card" [class.is-selected]="settings.defaultGender === 'male'" for="maleOption">
                            <input
                                class="visually-hidden"
                                type="radio"
                                name="genderOptions"
                                [value]="'male'"
                                [checked]="settings.defaultGender === 'male'"
                                (change)="onSelectGender('male')"
                                id="maleOption">
                            <span>{{ 'settings.defaultGender.male' | translate }}</span>
                        </label>

                        <label class="option-card" [class.is-selected]="settings.defaultGender === 'female'" for="femaleOption">
                            <input
                                class="visually-hidden"
                                type="radio"
                                name="genderOptions"
                                [value]="'female'"
                                [checked]="settings.defaultGender === 'female'"
                                (change)="onSelectGender('female')"
                                id="femaleOption">
                            <span>{{ 'settings.defaultGender.female' | translate }}</span>
                        </label>

                        <label class="option-card" [class.is-selected]="settings.defaultGender === 'always-choose'" for="alwaysChooseOption">
                            <input
                                class="visually-hidden"
                                type="radio"
                                name="genderOptions"
                                [value]="'always-choose'"
                                [checked]="settings.defaultGender === 'always-choose'"
                                (change)="onSelectGender('always-choose')"
                                id="alwaysChooseOption">
                            <span>{{ 'settings.defaultGender.always-choose' | translate }}</span>
                        </label>
                    </div>
                </div>

                <label class="settings-row switch-row" for="explanationsSwitch">
                    <span class="setting-label">{{ 'settings.explanations' | translate }}</span>
                    <input
                        class="form-check-input"
                        type="checkbox"
                        [checked]="settings.lessExplanations"
                        (change)="onToggleVerbosity()"
                        id="explanationsSwitch">
                </label>

                <label class="settings-row switch-row" for="muteAudioSwitch">
                    <span class="setting-label">{{ 'settings.muteAudio' | translate }}</span>
                    <input
                        class="form-check-input"
                        type="checkbox"
                        [checked]="settings.muteAudio"
                        (change)="onToggleMuteAudio()"
                        id="muteAudioSwitch">
                </label>

                <label class="settings-row switch-row" for="skipShinySwitch">
                    <span class="setting-label">{{ 'settings.skipShinyRolls' | translate }}</span>
                    <input
                        class="form-check-input"
                        type="checkbox"
                        [checked]="settings.skipShinyRolls"
                        (change)="onToggleSkipShinyRolls()"
                        id="skipShinySwitch">
                </label>

                <label class="settings-row switch-row" for="skipMegaAnimationSwitch">
                    <span class="setting-label">{{ 'settings.skipMegaEvolutionAnimation' | translate }}</span>
                    <input
                        class="form-check-input"
                        type="checkbox"
                        [checked]="settings.skipMegaEvolutionAnimation"
                        (change)="onToggleSkipMegaEvolutionAnimation()"
                        id="skipMegaAnimationSwitch">
                </label>

                <div class="settings-row">
                    <app-language-selector></app-language-selector>
                </div>
            </div>
        }
    </section>
</main>
