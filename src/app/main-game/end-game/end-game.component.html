<div class="fireworks-container" #fireworksContainer></div>

<main class="end-game-screen">
    <p class="congrats-text">{{ 'game.end.congrats' | translate }}</p>

    <section class="champion-shell">
        <div #captureArea class="champion-export">
            <header class="champion-header">
                <span class="champion-kicker">Pokemon Roulette</span>
                <h1>{{ 'game.end.champion' | translate }} {{ generation.region }}!</h1>
            </header>

            <div class="champion-layout">
                <section class="team-export-grid">
                    @for (slot of teamSlots; track slot) {
                        <article
                            class="export-pokemon-card"
                            [class.is-empty]="!trainerTeam[slot]"
                            style="--color: {{ getPokemonColor(trainerTeam[slot]) || '#64748b' }}">
                            @if (trainerTeam[slot]; as pokemon) {
                                <img [src]="getPokemonSprite(pokemon)" alt="">
                            }
                        </article>
                    }
                </section>

                <aside class="trainer-export-card">
                    <div class="trainer-export-art">
                        @if (trainer.sprite) {
                            <img [src]="trainer.sprite" alt="Trainer">
                        }
                    </div>
                </aside>
            </div>
        </div>

        <div class="champion-actions">
            <button class="btn btn-success" (click)="shareResults()">
                <ng-icon name="bootstrapShare"></ng-icon> {{ 'game.end.share' | translate }}
            </button>
        </div>
    </section>
</main>
