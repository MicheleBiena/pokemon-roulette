<div class="game-container">
    <div class="game-layout">
        <aside class="extra-options action-rail">
            <section class="command-panel">
                <div class="brand-lockup">
                    <span class="brand-mark"></span>
                    <h1>Pokemon Roulette</h1>
                </div>
                <div class="action-grid">
                    <app-settings-button></app-settings-button>
                    <app-coffee-button></app-coffee-button>
                    <app-restart-game-button (restartEvent)="resetGameAction()"></app-restart-game-button>
                    <app-language-selector></app-language-selector>
                </div>
            </section>
        </aside>

        <main class="main-game">
            <section class="roulette-stage">
                <app-roulette-container
                    (resetGameEvent)="resetGame()">
                </app-roulette-container>
            </section>
        </main>

        <aside class="trainer-info">
            <app-trainer-team
                (megaStoneInterrupt)="megaStoneInterrupt($event)">
            </app-trainer-team>
            <app-items
                (rareCandyInterrupt)="rareCandyInterrupt($event)"
                (megaStoneInterrupt)="megaStoneInterrupt($event)">
            </app-items>
        </aside>
    </div>
</div>
